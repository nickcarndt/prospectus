[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "prospectus-evals"
version = "0.1.0"
description = "Braintrust eval harness for Prospectus retrieval configs."
requires-python = ">=3.11"
dependencies = [
  "prospectus-shared",
  "prospectus-retrieval",
  "prospectus-generation",
  "braintrust>=0.0.180",
  "autoevals>=0.0.110",
  "pydantic>=2.7",
  "python-dotenv>=1.0.0",
  "anthropic>=0.40.0",
]

[project.scripts]
prospectus-evals = "prospectus_evals.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["prospectus_evals*"]
