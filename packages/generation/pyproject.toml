[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "prospectus-generation"
version = "0.1.0"
description = "Cited answer generation with Claude structured output and abstention."
requires-python = ">=3.11"
dependencies = [
  "prospectus-shared",
  "prospectus-retrieval",
  "anthropic>=0.40.0",
  "pydantic>=2.7",
  "python-dotenv>=1.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["prospectus_generation*"]
