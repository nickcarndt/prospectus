[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "prospectus-shared"
version = "0.1.0"
description = "Shared Pydantic schemas for Prospectus ingest, retrieval, and generation."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["prospectus_shared*"]
