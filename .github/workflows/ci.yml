name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages + test deps
        run: |
          python -m pip install -U pip
          pip install -e packages/shared -e packages/retrieval -e packages/generation -e packages/evals
          pip install -r services/api/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest

  web-typecheck:
    name: Web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Typecheck / build
        # Build needs public API URL for any client modules that read env at build.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
